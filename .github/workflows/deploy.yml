name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out vault content
        uses: actions/checkout@v4

      - name: Clone Quartz
        run: git clone --depth 1 https://github.com/jackyzha0/quartz.git quartz

      - name: Prepare content
        run: |
          rm -rf quartz/content/*
          rsync -av --exclude='.git' --exclude='quartz' --exclude='.github' --exclude='.superpowers' --exclude='flowwriter' ./ quartz/content/
          cp .quartz/quartz.config.ts quartz/
          cp .quartz/quartz.layout.ts quartz/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: quartz
        run: npm ci

      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build

      - name: Copy static assets
        run: |
          cp -r flowwriter quartz/public/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
